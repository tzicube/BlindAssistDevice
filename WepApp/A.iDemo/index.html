<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Demo Camera Layer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="camera-card">
      <p class="eyebrow">A.iDemo Frontend</p>
      <h1>Camera Layer Preview</h1>
      <p class="intro">
        Choose an available camera, then start a realtime preview directly in the browser.
      </p>

      <div class="controls">
        <label class="field" for="cameraSelect">
          <span>Camera Input</span>
          <select id="cameraSelect" aria-label="Select camera input">
            <option value="">Loading cameras...</option>
          </select>
        </label>

        <button id="startButton" type="button">Start Camera</button>
      </div>

      <p id="statusMessage" class="status" role="status">
        Checking available cameras...
      </p>

      <div class="video-frame">
        <video
          id="cameraPreview"
          autoplay
          playsinline
          muted
        ></video>
        <div id="videoPlaceholder" class="placeholder">
          Camera preview will appear here after you start a stream.
        </div>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
